{% extends "base.html" %}
{% block title %}Link Expired — {{ cfg.site_name }}{% endblock %}
{% block content %}
<div class="max-w-lg mx-auto px-4 py-24 text-center">
  <div class="bg-white rounded-3xl border border-slate-200 shadow-sm p-10">
    <i class="fa-solid fa-clock text-6xl text-orange-400 mb-5 block"></i>
    <h1 class="text-2xl font-extrabold text-slate-800 mb-2">Link Download Expired</h1>
    <p class="text-slate-500 mb-6">Link download sudah kadaluarsa atau batas download tercapai. Hubungi kami untuk link baru.</p>
    <a href="https://wa.me/{{ cfg.contact_wa }}" target="_blank"
      class="inline-flex items-center gap-2 px-6 py-3 bg-green-500 hover:bg-green-600 text-white font-bold rounded-xl transition-all shadow-md">
      <i class="fa-brands fa-whatsapp"></i> Hubungi Support
    </a>
  </div>
</div>
{% endblock %}
