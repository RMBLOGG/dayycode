<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Login Admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <script>tailwind.config={theme:{extend:{fontFamily:{sans:['Inter','sans-serif']}}}}</script>
</head>
<body class="font-sans bg-slate-100 min-h-screen flex items-center justify-center p-4">
  <div class="w-full max-w-sm">
    <div class="text-center mb-8">
      <div class="w-14 h-14 bg-blue-600 rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-lg shadow-blue-500/20">
        <i class="fa-solid fa-code text-white text-xl"></i>
      </div>
      <h1 class="text-2xl font-extrabold text-slate-800">Admin Panel</h1>
      <p class="text-slate-400 text-sm mt-1">SourceMarket</p>
    </div>
    <div class="bg-white border border-slate-200 rounded-2xl p-6 shadow-sm">
      <div id="err" class="hidden mb-4 p-3 bg-red-50 border border-red-200 rounded-xl text-sm text-red-600 font-medium flex items-center gap-2">
        <i class="fa-solid fa-circle-exclamation"></i><span id="errText"></span>
      </div>
      <div class="space-y-4">
        <div>
          <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1.5">Username</label>
          <div class="relative">
            <i class="fa-solid fa-user absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-sm"></i>
            <input type="text" id="username" placeholder="admin"
              class="w-full pl-9 pr-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl text-slate-800 text-sm outline-none focus:border-blue-500 focus:bg-white transition-colors"
              onkeydown="if(event.key==='Enter')document.getElementById('password').focus()">
          </div>
        </div>
        <div>
          <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1.5">Password</label>
          <div class="relative">
            <i class="fa-solid fa-lock absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-sm"></i>
            <input type="password" id="password" placeholder="••••••••"
              class="w-full pl-9 pr-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl text-slate-800 text-sm outline-none focus:border-blue-500 focus:bg-white transition-colors"
              onkeydown="if(event.key==='Enter')doLogin()">
          </div>
        </div>
        <button onclick="doLogin()" id="btn"
          class="w-full py-3 bg-blue-600 hover:bg-blue-700 text-white font-extrabold rounded-xl text-sm transition-all active:scale-[.98] flex items-center justify-center gap-2 shadow-md shadow-blue-500/20">
          <i class="fa-solid fa-right-to-bracket"></i> Masuk
        </button>
      </div>
    </div>
    <p class="text-center text-slate-400 text-xs mt-4">Default: admin / admin123</p>
  </div>
  <script>
    async function doLogin() {
      const btn = document.getElementById('btn');
      btn.disabled = true; btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin mr-2"></i>Masuk...';
      document.getElementById('err').classList.add('hidden');
      const res = await fetch('/admin/login', { method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ username: document.getElementById('username').value, password: document.getElementById('password').value }) });
      const d = await res.json();
      if (d.ok) { window.location.href = '/admin/dashboard'; }
      else {
        document.getElementById('errText').textContent = d.error;
        document.getElementById('err').classList.remove('hidden');
        btn.disabled = false; btn.innerHTML = '<i class="fa-solid fa-right-to-bracket"></i> Masuk';
      }
    }
  </script>
</body>
</html>
